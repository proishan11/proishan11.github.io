<footer class="site-footer">
  <div class="footer-links">
    <a href="{{ "feed.xml" | relURL }}">RSS</a>
    <span class="footer-sep">·</span>
    {{ with .Site.Params.github }}<a href="https://github.com/{{ . }}" target="_blank" rel="noopener">GitHub</a><span class="footer-sep">·</span>{{ end }}
    {{ with .Site.Params.twitter }}<a href="https://x.com/{{ . }}" target="_blank" rel="noopener">Twitter</a><span class="footer-sep">·</span>{{ end }}
    <a href="{{ "about/" | relURL }}">About</a>
  </div>
  <p>&copy; {{ now.Year }} {{ .Site.Title }} · Built with <a href="https://gohugo.io" target="_blank" rel="noopener">Hugo</a></p>
</footer>
