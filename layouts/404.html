{{ define "main" }}

      <div class="sidebar-label">Status</div>
      <div class="sidebar-value">404</div>
    </div>
  </aside>
  <div class="main-content">
    <h1 class="list-page-title">Not Found</h1>

    </div>
  </div>
</div>
{{ end }}
